<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LoRa Mesh Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #181a20;
            color: #e0e0e0;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 10px;
        }
        .card {
            background: #23272f;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px #0004;
        }
        button {
            padding: 8px 16px;
            background: #2d8cf0;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a6fb3;
        }
        input {
            background: #181a20;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 6px;
        }
        h1, h2 {
            color: #2d8cf0;
        }
        #devicesList {
            margin-top: 10px;
            background: #23272f;
            border-radius: 6px;
            padding: 10px;
        }
        .chat {
            background: #181a20;
            border-radius: 8px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .msg {
            margin: 8px 0;
            padding: 8px 12px;
            border-radius: 6px;
            max-width: 80%;
            word-break: break-word;
            display: flex;
            flex-direction: column;
        }
        .msg.me {
            background: #2d8cf0;
            color: #fff;
            margin-left: auto;
            align-items: flex-end;
        }
        .msg.them {
            background: #23272f;
            color: #e0e0e0;
            margin-right: auto;
            align-items: flex-start;
        }
        .msg .meta {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 2px;
        }
        @media (max-width: 700px) {
            .container { max-width: 100vw; padding: 2vw; }
            .card { padding: 10px; }
            .chat { max-height: 40vh; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LoRa Mesh Dashboard</h1>
        <div class="card">
            <h2>Chat</h2>
            <div class="chat" id="chatBox">Loading...</div>
            <form id="sendForm" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                <input type="text" name="target" value="FFFF" style="width:90px" placeholder="Target (hex)" />
                <input type="text" name="message" style="flex:1" placeholder="Type a message..." />
                <button type="submit">Send</button>
            </form>
            <div id="sendStatus"></div>
        </div>
        <div class="card">
            <h2>Connected Devices</h2>
            <button onclick="fetchDevices()">Refresh</button>
            <div id="devicesList">Loading...</div>
        </div>
        <div class="card">
            <h2>System</h2>
            <button id="updateBtn">Update & Reboot</button>
            <div id="updateStatus"></div>
        </div>
        <div class="card">
            <h2>Received Messages</h2>
            <button onclick="fetchRecv()">Refresh</button>
            <div id="recvData"></div>
        </div>
    </div>
    <script>
        document.getElementById('sendForm').onsubmit = async function(e) {
            e.preventDefault();
            const form = new FormData(this);
            const res = await fetch('/send', { method: 'POST', body: form });
            const data = await res.json();
            document.getElementById('sendStatus').innerText = data.status;
            await fetchHistory();
        };
        document.getElementById('updateBtn').onclick = async function() {
            document.getElementById('updateStatus').innerText = 'Updating and rebooting...';
            const res = await fetch('/update', { method: 'POST' });
            const data = await res.json();
            document.getElementById('updateStatus').innerText = data.status;
        };
        async function fetchHistory() {
            const res = await fetch('/history');
            const data = await res.json();
            const chatBox = document.getElementById('chatBox');
            if (Array.isArray(data.messages)) {
                chatBox.innerHTML = data.messages.map(msg => `
                    <div class="msg ${msg.outgoing ? 'me' : 'them'}">
                        <div>${msg.payload}</div>
                        <div class="meta">${msg.outgoing ? 'To ' + msg.to : 'From ' + msg.from} • ${msg.timestamp}${msg.rssi !== null ? ' • RSSI: ' + msg.rssi : ''}</div>
                    </div>
                `).join('');
                chatBox.scrollTop = chatBox.scrollHeight;
            } else {
                chatBox.innerText = 'No messages.';
            }
        }
        async function fetchRecv() {
            await fetch('/recv');
            await fetchHistory();
        }
        async function fetchDevices() {
            const res = await fetch('/devices');
            const data = await res.json();
            if (Array.isArray(data.devices)) {
                document.getElementById('devicesList').innerHTML = data.devices.length ?
                    data.devices.map(d => `<div>Addr: <b>${d.addr}</b> | RSSI: ${d.rssi}</div>`).join('') : 'No devices.';
            } else {
                document.getElementById('devicesList').innerText = 'No devices.';
            }
        }
        fetchDevices();
        fetchHistory();
        setInterval(fetchRecv, 2000);
    </script>
</body>
</html>
